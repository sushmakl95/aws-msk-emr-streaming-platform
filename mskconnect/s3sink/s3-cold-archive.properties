# -----------------------------------------------------------------------------
# Confluent S3 Sink Connector
# -----------------------------------------------------------------------------
# Archives CDC topics to S3 in Parquet, partitioned hourly. Works alongside the
# Iceberg sink from Spark/Flink for redundant cold storage (S3 here is the
# raw-bytes archive; Iceberg is the queryable format).
# -----------------------------------------------------------------------------

name=s3-cold-archive
connector.class=io.confluent.connect.s3.S3SinkConnector
tasks.max=4

topics.regex=^cdc\\..*

# ---- S3 target ----
s3.region=${AWS_REGION}
s3.bucket.name=streaming-platform-cold-archive
s3.part.size=26214400
# 25 MB multipart part size - balance memory + throughput

# Compression
s3.compression.type=gzip

# ---- Output format ----
format.class=io.confluent.connect.s3.format.parquet.ParquetFormat
parquet.codec=snappy

# ---- Partitioning ----
partitioner.class=io.confluent.connect.storage.partitioner.TimeBasedPartitioner
path.format='year='YYYY'/month='MM'/day='dd'/hour='HH
partition.duration.ms=3600000
# 1-hour partitions
locale=en-US
timezone=UTC
timestamp.extractor=RecordField
timestamp.field=ts_ms

# ---- Flush triggers ----
flush.size=50000
rotate.interval.ms=600000
# Flush every 50k records OR every 10 min, whichever first

# ---- Schema Registry ----
schema.compatibility=BACKWARD
value.converter=com.amazonaws.services.schemaregistry.kafkaconnect.AWSKafkaAvroConverter
value.converter.schemaAutoRegistrationEnabled=true
value.converter.schemaRegistryName=streaming-platform
value.converter.region=${AWS_REGION}
value.converter.avroRecordType=GENERIC_RECORD
key.converter=org.apache.kafka.connect.storage.StringConverter

# ---- Error handling ----
behavior.on.null.values=ignore
errors.tolerance=all
errors.log.enable=true
errors.deadletterqueue.topic.name=__s3-sink-dlq
errors.deadletterqueue.context.headers.enable=true

# ---- Parallelism ----
s3.schema.partitioner.field.name=source_table
