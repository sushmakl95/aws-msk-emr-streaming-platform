# -----------------------------------------------------------------------------
# Debezium MySQL CDC Connector
# -----------------------------------------------------------------------------
# For RDS MySQL or Aurora MySQL. Pre-requisites:
#   - binlog_format = ROW, binlog_row_image = FULL
#   - debezium user with REPLICATION SLAVE, REPLICATION CLIENT, SELECT grants
# -----------------------------------------------------------------------------

name=mysql-inventory-cdc
connector.class=io.debezium.connector.mysql.MySqlConnector
tasks.max=1

database.hostname=${MYSQL_HOST}
database.port=3306
database.user=debezium_user
database.password=${MYSQL_PASSWORD}
database.server.id=2001
database.include.list=inventory

# Topic naming
topic.prefix=cdc
table.include.list=inventory.stock_levels,inventory.warehouses,inventory.shipments

# Schema history
schema.history.internal.kafka.topic=__debezium-schema-history-inventory
schema.history.internal.kafka.bootstrap.servers=${MSK_BOOTSTRAP_SERVERS}
schema.history.internal.producer.security.protocol=SASL_SSL
schema.history.internal.producer.sasl.mechanism=AWS_MSK_IAM
schema.history.internal.consumer.security.protocol=SASL_SSL
schema.history.internal.consumer.sasl.mechanism=AWS_MSK_IAM

include.schema.changes=true
snapshot.mode=initial
snapshot.locking.mode=none

key.converter=com.amazonaws.services.schemaregistry.kafkaconnect.AWSKafkaAvroConverter
key.converter.schemaAutoRegistrationEnabled=true
key.converter.schemaRegistryName=streaming-platform
key.converter.region=${AWS_REGION}
value.converter=com.amazonaws.services.schemaregistry.kafkaconnect.AWSKafkaAvroConverter
value.converter.schemaAutoRegistrationEnabled=true
value.converter.schemaRegistryName=streaming-platform
value.converter.region=${AWS_REGION}

heartbeat.interval.ms=30000
errors.tolerance=none
errors.log.enable=true
errors.deadletterqueue.topic.name=__debezium-dlq-inventory
