# -----------------------------------------------------------------------------
# Debezium MongoDB CDC Connector
# -----------------------------------------------------------------------------
# For DocumentDB or Atlas MongoDB. Requires replica set (for oplog access).
# -----------------------------------------------------------------------------

name=mongo-sessions-cdc
connector.class=io.debezium.connector.mongodb.MongoDbConnector
tasks.max=1

mongodb.connection.string=${MONGO_CONNECTION_STRING}
mongodb.user=debezium_user
mongodb.password=${MONGO_PASSWORD}
mongodb.ssl.enabled=true
mongodb.authsource=admin

# Topic naming: cdc.<database>.<collection>
topic.prefix=cdc
database.include.list=sessions
collection.include.list=sessions.user_sessions,sessions.page_views

# Capture strategy: change_streams (preferred over oplog for Mongo 3.6+)
capture.mode=change_streams_update_full

# Snapshot
snapshot.mode=initial
snapshot.max.threads=2

# Schema Registry
key.converter=com.amazonaws.services.schemaregistry.kafkaconnect.AWSKafkaAvroConverter
key.converter.schemaAutoRegistrationEnabled=true
key.converter.schemaRegistryName=streaming-platform
key.converter.region=${AWS_REGION}
value.converter=com.amazonaws.services.schemaregistry.kafkaconnect.AWSKafkaAvroConverter
value.converter.schemaAutoRegistrationEnabled=true
value.converter.schemaRegistryName=streaming-platform
value.converter.region=${AWS_REGION}

heartbeat.interval.ms=30000
errors.tolerance=none
errors.log.enable=true
errors.deadletterqueue.topic.name=__debezium-dlq-sessions
