# -----------------------------------------------------------------------------
# Debezium Postgres CDC Connector
# -----------------------------------------------------------------------------
# Deployed via MSK Connect. Update ${PLACEHOLDERS} before creating the connector.
# Upload via: scripts/deploy-connectors.sh
#
# Pre-requisites:
#   1. Postgres wal_level = logical
#   2. Replication slot + publication created (see scripts/setup-postgres-cdc.sql)
#   3. IAM role: msk-connect-postgres-debezium-role
# -----------------------------------------------------------------------------

name=postgres-orders-cdc
connector.class=io.debezium.connector.postgresql.PostgresConnector
tasks.max=1

# ---- Source database connection ----
database.hostname=${POSTGRES_HOST}
database.port=5432
database.user=debezium_user
database.password=${POSTGRES_PASSWORD}
database.dbname=analytics
database.server.name=pg-analytics-prod
database.sslmode=require

# ---- Replication slot + publication ----
plugin.name=pgoutput
slot.name=debezium_orders_slot
publication.name=debezium_orders_pub
publication.autocreate.mode=filtered

# ---- Tables to capture ----
table.include.list=public.orders,public.order_items,public.customers
schema.include.list=public

# ---- Output topic naming: cdc.<schema>.<table> ----
topic.prefix=cdc
transforms=route,unwrap
transforms.route.type=io.debezium.transforms.ByLogicalTableRouter
transforms.route.topic.regex=(.*)
transforms.route.topic.replacement=$1

# Unwrap ExtractNewRecordState: flatten Debezium envelope (optional)
# Remove if downstream needs full envelope (op, before, after)
# transforms.unwrap.type=io.debezium.transforms.ExtractNewRecordState
# transforms.unwrap.drop.tombstones=false
# transforms.unwrap.delete.handling.mode=rewrite

# ---- Schema Registry (Glue) ----
key.converter=com.amazonaws.services.schemaregistry.kafkaconnect.AWSKafkaAvroConverter
key.converter.schemaAutoRegistrationEnabled=true
key.converter.schemaRegistryName=streaming-platform
key.converter.region=${AWS_REGION}
key.converter.avroRecordType=GENERIC_RECORD
value.converter=com.amazonaws.services.schemaregistry.kafkaconnect.AWSKafkaAvroConverter
value.converter.schemaAutoRegistrationEnabled=true
value.converter.schemaRegistryName=streaming-platform
value.converter.region=${AWS_REGION}
value.converter.avroRecordType=GENERIC_RECORD

# ---- Snapshot behavior ----
snapshot.mode=initial
# Options: never | initial | initial_only | when_needed | exported

# ---- Reliability ----
heartbeat.interval.ms=30000
heartbeat.topics.prefix=__debezium-heartbeat
poll.interval.ms=500

# Disable tombstones for deletes so downstream doesn't have to handle nulls
tombstones.on.delete=false

# ---- Schema evolution ----
include.schema.changes=true
schema.history.internal.kafka.topic=__debezium-schema-history-orders
schema.history.internal.kafka.bootstrap.servers=${MSK_BOOTSTRAP_SERVERS}
schema.history.internal.producer.security.protocol=SASL_SSL
schema.history.internal.producer.sasl.mechanism=AWS_MSK_IAM
schema.history.internal.consumer.security.protocol=SASL_SSL
schema.history.internal.consumer.sasl.mechanism=AWS_MSK_IAM

# ---- Error handling ----
errors.tolerance=none
errors.log.enable=true
errors.log.include.messages=true
errors.deadletterqueue.topic.name=__debezium-dlq-orders
errors.deadletterqueue.context.headers.enable=true
